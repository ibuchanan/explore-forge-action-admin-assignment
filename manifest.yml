modules:
  automation:actionProvider:
    - key: admin-assignment-action-provider
      actions:
        - admin-assignment-action
  action:
    - key: admin-assignment-action
      name: Restore admin access
      function: restoreAccess
      description: Restores a Target User's directory access and adds them to the
        Selected Groups.
      config:
        resource: main-resource
        render: native
      inputs:
        initiatorAccountId:
          title: Initiator account ID
          type: string
          description: The account ID of the Authorized Initiator, e.g.
            {{initiator.accountId}}
          required: true
        targetUserEmail:
          title: Target user email
          type: string
          description: The email address of the Target User whose access should be restored
          required: true
        selectedGroupKeys:
          title: Selected group keys
          type: string
          description: Comma-separated Group Keys chosen from the configured Allowed Groups
          required: true
      actionVerb: UPDATE
  trigger:
    - key: admin-assignment-lifecycle-trigger
      function: runLifecycleValidation
      events:
        - avi:forge:installed:app
        - avi:forge:upgraded:app
  function:
    - key: restoreAccess
      handler: index.restoreAccess
    - key: runLifecycleValidation
      handler: index.runLifecycleValidation
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/7b5d7c1c-387c-40d8-a530-e16614d64b5b
resources:
  - key: main-resource
    path: src/frontend/index.tsx
permissions:
  scopes:
    - storage:app
  external:
    fetch:
      backend:
        - address: https://api.atlassian.com
