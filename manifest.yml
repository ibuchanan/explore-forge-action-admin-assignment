modules:
  automation:actionProvider:
    - key: admin-assignment-action-provider
      actions:
        - admin-assignment-action
        - admin-assignment-batch-action
  action:
    - key: admin-assignment-action
      name: Restore admin access
      function: restoreAccess
      description: Restores a Target User's directory access and adds them to the
        Selected Groups.
      config:
        resource: single-config
        render: native
      inputs:
        initiatorAccountId:
          title: Initiator account ID
          type: string
          description: The account ID of the Authorized Initiator, e.g.
            {{initiator.accountId}}
          required: true
        targetUserEmail:
          title: Target user email
          type: string
          description: The email address of the Target User whose access should be restored
          required: true
        selectedGroupKeys:
          title: Selected group keys
          type: string
          description: Comma-separated Group Keys chosen from the configured Allowed Groups
          required: true
      actionVerb: UPDATE
    - key: admin-assignment-batch-action
      name: Restore admin access (bulk)
      function: enqueueBatch
      description: Enqueues a Batch Access Restoration for one or more Target User
        Emails, each restoring directory access and adding the Selected Groups
        independently.
      config:
        resource: batch-config
        render: native
      inputs:
        initiatorAccountId:
          title: Initiator account ID
          type: string
          description: The account ID of the Authorized Initiator, e.g.
            {{initiator.accountId}}
          required: true
        targetUserEmails:
          title: Target user emails
          type: string
          description: Comma-separated email addresses of the Target Users whose
            access should be restored
          required: true
        selectedGroupKeys:
          title: Selected group keys
          type: string
          description: Comma-separated Group Keys chosen from the configured Allowed Groups
          required: true
      actionVerb: UPDATE
  consumer:
    - key: admin-assignment-batch-consumer
      queue: admin-assignment-batch-queue
      function: processBatch
  trigger:
    - key: admin-assignment-lifecycle-trigger
      function: runLifecycleValidation
      events:
        - avi:forge:installed:app
        - avi:forge:upgraded:app
  jira:adminPage:
    - key: admin-assignment-configure-page
      title: Break-Glass Access – Configure
      render: native
      resource: admin-configure
      resolver:
        function: adminResolver
      useAsConfig: true
    - key: admin-assignment-status-page
      title: Break-Glass Access – Status
      render: native
      resource: admin-status
      resolver:
        function: adminResolver
  function:
    - key: restoreAccess
      handler: index.restoreAccess
    - key: enqueueBatch
      handler: index.enqueueAccessRestorationBatch
    - key: processBatch
      handler: index.processAccessRestorationBatchEvent
      timeoutSeconds: 900
    - key: runLifecycleValidation
      handler: index.runLifecycleValidation
    - key: adminResolver
      handler: resolvers/index.handler
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/7b5d7c1c-387c-40d8-a530-e16614d64b5b
resources:
  - key: single-config
    path: src/frontend/single-action-config.tsx
  - key: batch-config
    path: src/frontend/batch-action-config.tsx
  - key: admin-configure
    path: src/frontend/admin-configure.tsx
  - key: admin-status
    path: src/frontend/admin-status.tsx
permissions:
  scopes:
    - storage:app
  external:
    fetch:
      backend:
        - address: https://api.atlassian.com
