[project]
name = "explore-forge-action-admin-assignment"
revision = "1.0"

[profiles.default]
FORGE_SITE = { description = "Forge CLI target site, e.g. example.atlassian.net", required = true }
FORGE_PRODUCT = { description = "Forge CLI target product (jira, confluence, etc.)", default = "jira" }
FORGE_ENVIRONMENT = { description = "Forge CLI target environment (development, staging, production)", default = "development" }
ORGANIZATION_API_KEY = { description = "The Service Credential: an organization API key for the Organizations REST API, created in the Atlassian Admin Hub. Uploaded to Forge as an ENCRYPTED variable — see docs/adr/0002-keep-service-credential-in-forge-environment.md.", required = true }
ADMIN_ASSIGNMENT_SOURCE_CONFIG_JSON = { description = "Legacy Source Config JSON, uploaded to Forge as a PLAIN variable. Only used to seed Forge KVS once during install/upgrade — see docs/admin-config-lifecycle-spec.md.", required = false }
